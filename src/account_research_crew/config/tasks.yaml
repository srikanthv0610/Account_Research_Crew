company_research_task:
  description: >
    Research {company} for a customer meeting.

    Today's date is {today}. Prioritize the latest publicly available information.

    Gather:
    - Company snapshot
    - Recent news and developments
    - Key products and services
    - Recent financial performance
    - Key executives
    - Strategic initiatives or challenges
  expected_output: >
    A structured research summary for {company} with clearly labeled sections
    and dated recent findings.
  agent: company_research_agent

account_insight_task:
  description: >
    Review the research on {company} and convert it into meeting-relevant insight.

    Focus on:
    - Key business themes
    - Likely priorities or pain points
    - Opportunity signals
    - What matters most for the account executive
  expected_output: >
    A short account insight memo for {company} covering business themes,
    priorities, risks, and opportunities.
  agent: account_insight_agent

executive_briefing_task:
  description: >
    Use the research and account insight for {company} to create a concise
    pre-meeting briefing.

    Structure the briefing into:
    - Company snapshot
    - Recent developments
    - Key priorities
    - Suggested talking points
    - Smart discovery questions
  expected_output: >
    A polished executive briefing for {company} in markdown format, ready for
    an account executive to review before the meeting.
  agent: executive_briefing_agent
